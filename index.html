<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>SAS to Summit · L'Étape du Tour 2026 · Hommes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--bg:#0c1620;--bg2:#122130;--panel:#152838;--line:#263d52;--ink:#eaf1f5;--muted:#89a2b4;--gold:#f2b43d;--flamme:#e2503b;--ice:#74bccd;--ok:#5fc27e;}
  html[data-theme="light"]{--bg:#f3efe7;--bg2:#ffffff;--panel:#faf7f1;--line:#ded7c8;--ink:#1b2733;--muted:#5e7180;--gold:#a9761a;--flamme:#c23b27;--ice:#2c7a90;--ok:#3c9159;}
  html{background:var(--bg)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;
    background-image:linear-gradient(rgba(38,61,82,.35) 1px,transparent 1px),linear-gradient(90deg,rgba(38,61,82,.25) 1px,transparent 1px);background-size:100% 46px,46px 100%;}
  .wrap{max-width:960px;margin:0 auto;padding:clamp(20px,4vw,44px) clamp(16px,4vw,32px) 104px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .toprt{display:flex;gap:8px;align-items:center}
  .langsel{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .langsel button{font-family:'Inter';font-weight:700;font-size:.72rem;color:var(--muted);background:var(--bg2);border:none;padding:8px 12px;cursor:pointer}
  .langsel button[aria-pressed="true"]{background:var(--gold);color:#1a1206}
  .theme-toggle{font-family:'Inter';font-weight:600;font-size:.76rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:8px 14px;cursor:pointer;white-space:nowrap}
  .theme-toggle:hover{border-color:var(--gold);color:var(--ink)}
  .eyebrow{font-family:'Barlow Condensed';font-weight:600;letter-spacing:.28em;text-transform:uppercase;font-size:.8rem;color:var(--gold)}
  h1{font-family:'Barlow Condensed';font-weight:700;line-height:.92;font-size:clamp(2.6rem,9vw,5.2rem);letter-spacing:-.01em;margin:.15em 0 .1em}
  h1 .sub{display:block;color:var(--ink)}
  .event{margin-top:6px;color:var(--gold);font-weight:700;letter-spacing:.02em;font-family:'JetBrains Mono';font-size:clamp(.72rem,2.4vw,.9rem)}
  .route{font-family:'JetBrains Mono';font-size:clamp(.72rem,2.4vw,.9rem);color:var(--muted);letter-spacing:.02em;margin-top:.3em}
  .route b{color:var(--ice);font-weight:700}
  .profile{margin:26px 0 8px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#0f1e2b,#0c1824);overflow:hidden;position:relative}
  .profile svg{display:block;width:100%;height:auto}
  .prof-cap{position:absolute;top:10px;left:14px;font-family:'Barlow Condensed';font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:.7rem;color:#89a2b4;z-index:2;pointer-events:none}
  .prof-ctrls{position:absolute;top:9px;right:11px;z-index:2;display:flex;gap:6px}
  .prof-dl,.prof-tog{font-family:'JetBrains Mono';font-weight:700;font-size:.66rem;color:#cfe0ea;background:rgba(12,22,32,.62);border:1px solid #3a5a76;border-radius:999px;padding:5px 11px;text-decoration:none;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);cursor:pointer}
  .prof-tog[aria-pressed="true"]{background:#3ad6a2;border-color:#3ad6a2;color:#08221a}
  .prof-dl:hover{border-color:#f2b43d;color:#f2b43d}
  .prof-plot{position:relative;cursor:crosshair}
  .prof-cross{position:absolute;top:0;bottom:0;width:1px;background:#74bccd;opacity:.6;pointer-events:none;display:none}
  .prof-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#f2b43d;border:2px solid #0c1620;transform:translate(-50%,-50%);pointer-events:none;display:none}
  .prof-tip{position:absolute;background:#152838;border:1px solid #395975;border-radius:8px;padding:6px 9px;font-family:'JetBrains Mono';font-size:.66rem;color:#eaf1f5;white-space:nowrap;pointer-events:none;display:none;z-index:3;box-shadow:0 5px 16px rgba(0,0,0,.45)}
  .prof-tip b{color:#f2b43d}
  .prof-tip .seg{display:block;color:#74bccd;font-family:'Barlow Condensed';font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:.74rem;margin-bottom:1px}
  .prof-axis{position:relative;height:15px;margin:3px 6px 2px}
  .prof-axis span{position:absolute;font-family:'JetBrains Mono';font-size:.6rem;color:#89a2b4}
  .prof-axis .u{color:#5f7d95}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:clamp(18px,3vw,26px);margin-top:22px}
  .panel-title{font-family:'Barlow Condensed';font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:.82rem;color:var(--muted);margin-bottom:16px}
  .fields3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  @media(max-width:560px){.fields3{grid-template-columns:1fr 1fr}}
  label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:7px;font-weight:500}
  .inp{display:flex;align-items:baseline;gap:8px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .inp:focus-within{border-color:var(--gold)}
  .inp input{background:none;border:none;color:var(--ink);font-family:'JetBrains Mono';font-weight:700;font-size:1.15rem;width:100%;min-width:0;outline:none}
  .inp .unit{flex:0 0 auto}
  .sas-note{margin-top:10px;font-size:.78rem;color:var(--muted);line-height:1.5}
  .sas-note b{color:var(--gold);font-family:'JetBrains Mono';font-weight:700}
  .inp .unit{font-family:'JetBrains Mono';color:var(--muted);font-size:.9rem;font-weight:500}
  .inp select{background:none;border:none;color:var(--ink);font-family:'JetBrains Mono';font-weight:700;font-size:1.05rem;width:100%;outline:none;appearance:none;cursor:pointer}
  .inp select option{background:#122130;color:#eaf1f5}
  .obj{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
  @media(max-width:560px){.obj{grid-template-columns:1fr 1fr}}
  .obj button{font-family:'Inter';font-weight:600;font-size:.82rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 6px;cursor:pointer;line-height:1.25}

  .obj button[aria-pressed="true"]{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .results{margin-top:26px}
  .total{display:flex;flex-wrap:wrap;align-items:flex-end;gap:6px 28px;border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:6px}
  .total .big{font-family:'Barlow Condensed';font-weight:700;font-size:clamp(3rem,12vw,5rem);line-height:.85;color:var(--gold)}
  .total .meta{font-size:.82rem;color:var(--muted);padding-bottom:8px}
  .total .meta b{color:var(--ice);font-family:'JetBrains Mono';font-weight:700}
  .timeline{display:flex;flex-direction:column}
  .col{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:16px 4px;border-bottom:1px solid var(--line)}
  .col .idx{font-family:'Barlow Condensed';font-weight:700;font-size:1.5rem;color:var(--line);width:26px;text-align:center;padding-top:2px}
  .col.key .idx{color:var(--flamme)}
  .col .name{font-family:'Barlow Condensed';font-weight:600;font-size:1.35rem}
  .col .spec{font-family:'JetBrains Mono';font-size:.72rem;color:var(--muted);margin-top:1px}
  .col .cue{font-size:.74rem;color:var(--ice);margin-top:3px;font-style:italic}
  .col .nums{text-align:right;white-space:nowrap;padding-top:2px}
  .col .w{font-family:'JetBrains Mono';font-weight:700;font-size:1.5rem;color:var(--gold)}
  .col .w .u{font-size:.5em;color:var(--muted);font-weight:500}
  .col .wkg{font-family:'JetBrains Mono';font-size:.74rem;color:var(--muted);margin-top:1px}
  .col .t{font-family:'JetBrains Mono';font-size:.82rem;color:var(--ink);margin-top:3px}
  .col .pass{font-family:'JetBrains Mono';font-size:.7rem;color:var(--gold);margin-top:1px}
  .liaison{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:11px 4px;border-bottom:1px solid var(--line)}
  .liaison .dot{width:26px;text-align:center;color:#5a89a8;font-size:1rem;opacity:.8}
  .liaison .ln{font-family:'Inter';font-size:.86rem;color:var(--muted)}
  .liaison .ls{font-family:'JetBrains Mono';font-size:.68rem;color:var(--line)}
  .liaison .lt{text-align:right;white-space:nowrap;font-family:'JetBrains Mono';font-size:.76rem;color:var(--muted)}
  .liaison .lp{font-family:'JetBrains Mono';font-size:.68rem;color:var(--muted);opacity:.7}
  .ravito{margin-top:6px;font-size:.72rem;color:var(--ink);background:rgba(116,188,205,.09);border:1px solid rgba(116,188,205,.28);border-radius:7px;padding:5px 9px;display:inline-block}
  .ravito .rk{font-family:'JetBrains Mono';color:var(--ice);font-weight:700}
  .barrier{margin-top:7px;font-size:.72rem;font-family:'JetBrains Mono';padding:5px 9px;border-radius:7px;display:inline-block;background:rgba(226,80,59,.1);border:1px solid rgba(226,80,59,.3);color:#f0a99e}
  .barrier b{color:var(--flamme)} .barrier.ok{background:rgba(95,194,126,.1);border-color:rgba(95,194,126,.3);color:#b6e6c6}
  .barrier.ok b{color:var(--ok)}
  .rzone{grid-column:2/-1}
  .nutri-sub{font-size:.86rem;color:var(--muted);margin:-6px 0 18px}
  .nutri-sub b{color:var(--gold);font-family:'JetBrains Mono';font-weight:700}
  .sliders{margin-top:20px;display:grid;gap:18px}
  .slider-row .shead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .slider-row .slabel{font-size:.86rem;color:var(--ink);font-weight:500}
  .slider-row .sval{font-family:'JetBrains Mono';font-weight:700;color:var(--gold);font-size:1.1rem}
  .slider-row .sval small{color:var(--muted);font-weight:500;font-size:.72rem}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:6px;background:var(--bg2);outline:none;border:1px solid var(--line);accent-color:var(--gold)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);border:3px solid #0c1620;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--gold);border:3px solid #0c1620;cursor:pointer}
  .gauge-wrap{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
  .gauge-top{display:flex;justify-content:space-between;align-items:baseline;font-family:'JetBrains Mono';font-size:.8rem;color:var(--muted);margin-bottom:8px}
  .gauge-top b{color:var(--ink);font-weight:700}
  .gauge{position:relative;height:26px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .gauge-fill{height:100%;width:0;background:linear-gradient(90deg,#c9902f,var(--gold));transition:width .25s,background .25s}
  .gauge.short .gauge-fill{background:linear-gradient(90deg,#b23a2c,var(--flamme))}
  .gauge.good .gauge-fill{background:linear-gradient(90deg,#3f9a5e,var(--ok))}
  .verdict{margin-top:16px;font-size:.92rem;font-weight:500;color:var(--ink)}
  .verdict .em{font-family:'JetBrains Mono';font-weight:700}
  .verdict.short .em{color:var(--flamme)} .verdict.good .em{color:var(--ok)} .verdict.over .em{color:var(--gold)}
  .sodium{margin-top:14px;font-size:.78rem;color:var(--muted)} .sodium b{color:var(--ice)}
  .nsel{display:flex;gap:8px;margin-top:6px}
  .nsel button{flex:1;font-family:'Inter';font-weight:600;font-size:.82rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:11px 6px;cursor:pointer;line-height:1.2}
  .nsel button[aria-pressed="true"]{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .nchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .nchips button{font-family:'JetBrains Mono';font-weight:700;font-size:.78rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer}
  .nchips button[aria-pressed="true"]{background:var(--ice);color:#08222b;border-color:var(--ice)}
  .nblock{margin-top:22px}
  .nblock-t{font-family:'Barlow Condensed';font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:.8rem;color:var(--gold);margin-bottom:8px}
  .nrate{font-size:.92rem;color:var(--ink);line-height:1.7}
  .nrate b{color:var(--gold);font-family:'JetBrains Mono';font-weight:700}
  .ncl{font-size:.95rem;color:var(--ink);margin:3px 0}
  .ncl b{font-family:'JetBrains Mono';font-weight:700;color:var(--gold);font-size:1.15rem;margin-right:2px}
  .nc-note{font-size:.78rem;color:var(--muted);margin-top:9px;line-height:1.45}
  .nleg{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:10px 4px;border-bottom:1px solid var(--line)}
  .nleg .nlk{font-family:'Barlow Condensed';font-weight:700;font-size:1.1rem;color:var(--ice);width:36px;text-align:center}
  .nleg .nlh{font-family:'JetBrains Mono';font-size:.74rem;color:var(--ink)}
  .nleg .nls{font-family:'JetBrains Mono';font-size:.72rem;color:var(--muted);margin-top:2px}
  .nleg .nlwarn{font-size:.72rem;color:var(--flamme);font-weight:600;margin-top:2px}
  .nleg .nlact{font-size:.72rem;color:var(--ice);text-align:right;white-space:nowrap}
  .nleg.warn{background:rgba(226,80,59,.07)}
  .nleg.opt{opacity:.45} .nleg.opt .nlact{color:var(--muted)}
  .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
  .actionbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--bg2);border-top:1px solid var(--line);box-shadow:0 -8px 26px rgba(0,0,0,.3);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .actionbar-inner{max-width:960px;margin:0 auto;padding:12px clamp(16px,4vw,32px);display:flex;gap:10px;justify-content:center}
  .actionbar .actbtn{box-shadow:0 2px 10px rgba(0,0,0,.15)}
  @media(max-width:560px){.actionbar-inner{padding:10px 14px}.actionbar-inner .actbtn{flex:1 1 0;justify-content:center;padding:12px 10px}}
  .actbtn{font-family:'Inter';font-weight:600;font-size:.86rem;color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .actbtn:hover{border-color:var(--gold);color:var(--gold)}
  .actbtn.prim{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .foot{margin-top:26px;font-size:.72rem;color:var(--muted);line-height:1.6} .foot b{color:var(--ice)}
  .modal{position:fixed;inset:0;background:rgba(6,12,18,.82);display:none;align-items:flex-start;justify-content:center;padding:24px 12px;overflow:auto;z-index:50}
  .modal.open{display:flex}
  .sheet{background:#fff;color:#111;border-radius:12px;max-width:560px;width:100%;padding:18px}
  .sheet h3{font-family:'Barlow Condensed';font-weight:700;font-size:1.4rem;color:#111}
  .sheet p.hint{font-size:.78rem;color:#555;margin-bottom:12px}

  .sheet .close:hover{background:#c23b27;color:#fff;border-color:#c23b27}
  .sticker-print{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .tt{width:132px;border:1px dashed #999;border-radius:6px;overflow:hidden;font-family:Arial,sans-serif}
  .tt .h{background:#1c5e8c;color:#fff;text-align:center;padding:5px 3px}
  .tt .h b{font-size:11px;display:block}.tt .h small{font-size:7px;opacity:.9}
  .tt .r{padding:4px 5px;border-bottom:1px solid #ddd;font-size:8px;line-height:1.15;display:flex;justify-content:space-between}
  .tt .r.k{background:#fff4d6}.tt .r.c{background:#fbe9e9}.tt .r.d{background:#eef4fa}.tt .r.f{background:#f5f5f5}
  .tt .r .km{font-weight:700;color:#111}.tt .r .w{font-weight:700;color:#c8641a}.tt .r.k .w{color:#c81c36}
  .tt .r .rav{color:#1c6e8c;font-weight:700;font-size:7px}.tt .r .nm{color:#666;font-size:7px}
  .tt .foot2{background:#111;color:#fff;text-align:center;font-size:6.5px;padding:4px 3px;line-height:1.3}
  .st-ctrl{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;margin:4px 0 16px}
  .st-orient{display:flex;border:1px solid #ccc;border-radius:8px;overflow:hidden}
  .st-orient button{font-family:Arial,sans-serif;font-weight:700;font-size:12px;color:#555;background:#f2f2f2;border:none;padding:8px 12px;cursor:pointer}
  .st-orient button[aria-pressed="true"]{background:#1c5e8c;color:#fff}
  .st-size{font-family:Arial,sans-serif;font-size:12px;color:#333;display:flex;align-items:center;gap:6px}
  .st-size input{width:56px;font-family:Arial,sans-serif;font-size:13px;font-weight:700;padding:6px 8px;border:1px solid #ccc;border-radius:8px}
  .gx-dev{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:4px 0 14px}
  .gx-dev button{font-family:Arial,sans-serif;font-weight:700;font-size:13px;color:#555;background:#f2f2f2;border:1px solid #ccc;border-radius:8px;padding:9px 14px;cursor:pointer}
  .gx-dev button[aria-pressed="true"]{background:#1c5e8c;color:#fff;border-color:#1c5e8c}
  .gx-note{font-family:Arial,sans-serif;font-size:13px;color:#333;line-height:1.5;background:#f4f7fa;border:1px solid #dbe4ec;border-radius:8px;padding:12px 14px;min-height:1em}
  .gx-note b{color:#1c5e8c}
  .gx-note .warn{color:#c23b27;font-weight:700}
  .gx-msg{font-family:Arial,sans-serif;font-size:12px;color:#777;text-align:center;margin-top:10px;min-height:1em}
  .gx-fount{margin-top:12px;text-align:center}

  .gx-fount button[aria-pressed="true"]{background:#2fae86;color:#fff;border-color:#2fae86}
  .ttl{border:1px dashed #999;border-radius:6px;overflow-x:auto;max-width:100%;font-family:Arial,sans-serif}
  .ttl .hh{background:#1c5e8c;color:#fff;text-align:center;font-size:8px;font-weight:700;padding:4px}
  .ttl .lrow{display:flex}
  .ttl .c{flex:1 0 64px;min-width:64px;border-right:1px solid #ddd;padding:5px 4px}
  .ttl .c.k{background:#fff4d6;box-shadow:inset 0 2px 0 #1c5e8c}.ttl .c.c{background:#fbe9e9}.ttl .c.d{background:#eef4fa}.ttl .c.f{background:#f5f5f5}

  .ttl .c .nm{color:#666;font-size:7px;line-height:1.1;min-height:15px;margin:1px 0}
  .ttl .c .w{font-weight:700;color:#c8641a;font-size:10px}.ttl .c.k .w{color:#c81c36}
  .ttl .c .rav{color:#1c6e8c;font-weight:700;font-size:6.5px;margin-top:1px}
  .ttl .foot2{background:#111;color:#fff;text-align:center;font-size:7.5px;padding:5px 4px}
  .tt .r .tm,.ttl .c .tm{color:#777;font-weight:700}
  .tt .foot2 .sos,.ttl .foot2 .sos{color:#f2c078;font-weight:700}
  @media print{body{background:#fff!important}.topbar,.actions,.actionbar,.panel .obj,.modal{display:none!important}}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}

function currentSegc(){var ftp=Math.max(60,+document.getElementById('ftp').value||0),kg=Math.max(35,+document.getElementById('kg').value||0),mass=kg+8,base=baseIntensity();
  return SEG.map(function(s){var spd;if(s.type==='climb'){var pct=Math.max(0.55,base+s.delta);var w=Math.round(ftp*pct);spd=climbSpeed(w,mass,s.grad);return Object.assign({},s,{spd:spd});}spd=s.speed/3.6;return Object.assign({},s,{spd:spd});});}
function cumSecAt(segc,km){var c=0;for(var i=0;i<segc.length;i++){var s=segc[i];var segT=(s.to-s.from)*1000/s.spd;if(km<=s.to+1e-6)return c+Math.max(0,(km-s.from))*1000/s.spd;c+=segT;}return c;}
function wxSeries(){if(!WX.data)return null;var segc=currentSegc(),startSec=parseStart();
  return WXPTS.map(function(p,i){var passSec=startSec+cumSecAt(segc,p.km);var d=WX.data[i];
    if(!d||!d.hourly){return {pt:p,passSec:passSec,ok:false};}

      code:H.weather_code[hp],wind:H.wind_speed_10m[hp],gust:H.wind_gusts_10m[hp],wdir:H.wind_direction_10m[hp],pop:H.precipitation_probability[hp]};});}

// ---- Export GPS perso (GPX enrichi / TCX Garmin) ----
var gxDev='coros',TRACK=null;
var COLALT={"Croix de Fer":2067,"Télégraphe":1566,"Galibier":2642,"Sarenne":1999};
function xesc(s){return String(s).replace(/[&<>]/g,function(c){return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;';});}
function gxHav(a,b){var R=6371000,r=Math.PI/180,d1=(b.lat-a.lat)*r,d2=(b.lon-a.lon)*r,x=Math.sin(d1/2)*Math.sin(d1/2)+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(d2/2)*Math.sin(d2/2);return 2*R*Math.asin(Math.sqrt(x));}
function fetchTrack(){if(TRACK)return Promise.resolve(TRACK);
  return fetch('etape-du-tour-2026.gpx').then(function(r){if(!r.ok)throw new Error('http '+r.status);return r.text();}).then(function(x){
    var pts=[],re=/<trkpt lat="([-\d.]+)" lon="([-\d.]+)">\s*<ele>([-\d.]+)<\/ele>(?:\s*<time>([^<]+)<\/time>)?/g,m;
    while((m=re.exec(x))){pts.push({lat:+m[1],lon:+m[2],ele:+m[3],time:m[4]||'',cum:0});}
    if(!pts.length)throw new Error('no trkpt');
    for(var i=1;i<pts.length;i++)pts[i].cum=pts[i-1].cum+gxHav(pts[i-1],pts[i]);
    TRACK={pts:pts,raw:x};return TRACK;});}
function llAtKm(km){var pts=TRACK.pts,d=km*1000,L=pts[pts.length-1];if(d<=0)return {lat:pts[0].lat,lon:pts[0].lon,ele:pts[0].ele,idx:0};if(d>=L.cum)return {lat:L.lat,lon:L.lon,ele:L.ele,idx:pts.length-1};
  var lo=1,hi=pts.length-1;while(lo<hi){var mid=(lo+hi)>>1;if(pts[mid].cum<d)lo=mid+1;else hi=mid;}
  var b=pts[lo],a=pts[lo-1],f=(b.cum-a.cum)?(d-a.cum)/(b.cum-a.cum):0;
  return {lat:a.lat+(b.lat-a.lat)*f,lon:a.lon+(b.lon-a.lon)*f,ele:a.ele+(b.ele-a.ele)*f,idx:lo};}
function buildWpts(){
  var ftp=Math.max(60,+document.getElementById('ftp').value||0),base=baseIntensity(),segc=currentSegc(),startSec=parseStart(),out=[];
  SEG.forEach(function(s){
    if(s.type==='climb'){var pct=Math.max(0.55,base+s.delta),w=Math.round(ftp*pct),nm=NM(s.name),alt=COLALT[nm],pass=fmtClock(startSec+cumSecAt(segc,s.to));
      out.push({km:s.from,sym:'Summit',pt:'Summit',name:nm+' '+t('gxPied')+' - '+w+' W ('+s.grad+'%)',desc:(s.to-s.from).toFixed(1)+' km '+t('gxAt')+' '+s.grad+'% - '+t('gxAim')+' '+w+' W ('+Math.round(pct*100)+'% FTP)'+(s.cue?' - '+s.cue[lang]:'')});
      out.push({km:s.to,sym:'Summit',pt:'Summit',name:nm+' '+t('gxSummit')+(alt?' '+alt+' m':'')+' - '+pass,desc:t('gxPass')+' '+pass+(s.barrier?' - '+t('gxBarrier')+' '+s.barrier.time:'')});}
    (s.ravitos||[]).forEach(function(r){out.push({km:r.km,sym:(r.k==='ARR'?'Flag, Blue':'Water Source'),pt:'Water',name:r.k+' '+t('gxRavito')+' - km '+Math.round(r.km),desc:r.t[lang]});});
    if(s.warn){var wk=s.type==='climb'?s.from+0.2:s.to-0.8;out.push({km:wk,sym:'Danger Area',pt:'Danger',lab:t('gxDangerShort'),name:t('gxDanger')+' - '+s.warn[lang],desc:NM(s.name)});}
    if(s.barrier)out.push({km:s.barrier.km,sym:'Flag, Blue',pt:'Generic',lab:t('gxBarrierShort'),name:t('gxBarrier')+' '+NM(s.barrier.label)+' '+s.barrier.time,desc:'km '+s.barrier.km});
  });
  if(showFountains)FOUNTAINS.forEach(function(fk){out.push({km:fk,sym:'Water Source',pt:'Water',name:t('gxFount')+' - km '+Math.round(fk),desc:t('gxFountDesc')});});
  out.sort(function(a,b){return a.km-b.km;});return out;}
function buildGPX(w){
  var W=w.map(function(p){var ll=llAtKm(p.km);return '  <wpt lat="'+ll.lat.toFixed(6)+'" lon="'+ll.lon.toFixed(6)+'">\n    <ele>'+ll.ele.toFixed(1)+'</ele>\n    <name>'+xesc(p.name)+'</name>\n    <desc>'+xesc(p.desc)+'</desc>\n    <sym>'+p.sym+'</sym>\n  </wpt>';}).join('\n');
  var trk=(TRACK.raw.match(/<trk>[\s\S]*?<\/trk>/)||['<trk></trk>'])[0];
  return '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="SAS to Summit - Etape du Tour 2026" xmlns="http://www.topografix.com/GPX/1/1">\n  <metadata><name>Etape du Tour 2026 - perso</name></metadata>\n'+W+'\n  '+trk+'\n</gpx>\n';}
function buildTCX(w){
  var pts=TRACK.pts,L=pts[pts.length-1],T0='2026-07-19T00:00:00Z';
  var tp=pts.map(function(p){return '        <Trackpoint><Time>'+(p.time||T0)+'</Time><Position><LatitudeDegrees>'+p.lat.toFixed(6)+'</LatitudeDegrees><LongitudeDegrees>'+p.lon.toFixed(6)+'</LongitudeDegrees></Position><AltitudeMeters>'+p.ele.toFixed(1)+'</AltitudeMeters><DistanceMeters>'+p.cum.toFixed(1)+'</DistanceMeters></Trackpoint>';}).join('\n');
  var cp=w.map(function(p){var ll=llAtKm(p.km),n=pts[ll.idx]||pts[0];return '      <CoursePoint><Name>'+xesc(p.name.slice(0,40))+'</Name><Time>'+(n.time||T0)+'</Time><Position><LatitudeDegrees>'+ll.lat.toFixed(6)+'</LatitudeDegrees><LongitudeDegrees>'+ll.lon.toFixed(6)+'</LongitudeDegrees></Position><PointType>'+p.pt+'</PointType><Notes>'+xesc(p.name+' - '+p.desc)+'</Notes></CoursePoint>';}).join('\n');
  return '<?xml version="1.0" encoding="UTF-8"?>\n<TrainingCenterDatabase xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2">\n  <Courses>\n    <Course>\n      <Name>Etape 2026</Name>\n      <Lap>\n        <TotalTimeSeconds>0</TotalTimeSeconds>\n        <DistanceMeters>'+L.cum.toFixed(1)+'</DistanceMeters>\n        <BeginPosition><LatitudeDegrees>'+pts[0].lat.toFixed(6)+'</LatitudeDegrees><LongitudeDegrees>'+pts[0].lon.toFixed(6)+'</LongitudeDegrees></BeginPosition>\n        <EndPosition><LatitudeDegrees>'+L.lat.toFixed(6)+'</LatitudeDegrees><LongitudeDegrees>'+L.lon.toFixed(6)+'</LongitudeDegrees></EndPosition>\n        <Intensity>Active</Intensity>\n      </Lap>\n      <Track>\n'+tp+'\n      </Track>\n'+cp+'\n    </Course>\n  </Courses>\n</TrainingCenterDatabase>\n';}
function generateExport(){var msg=document.getElementById('gxMsg');msg.textContent=t('gxLoading');
  return fetchTrack().then(function(){var w=buildWpts(),blob,name;
    if(gxDev==='garmin'){blob=new Blob([buildTCX(w)],{type:'application/vnd.garmin.tcx+xml'});name='etape-2026-garmin.tcx';}
    else{blob=new Blob([buildGPX(w)],{type:'application/gpx+xml'});name='etape-2026-'+gxDev+'.gpx';}
    dl(blob,name);msg.textContent='';}).catch(function(){msg.textContent=t('gxError');});}
