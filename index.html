<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>SAS to Summit · L'Étape du Tour 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--bg:#0c1620;--bg2:#122130;--panel:#152838;--line:#263d52;--ink:#eaf1f5;--muted:#89a2b4;--gold:#f2b43d;--flamme:#e2503b;--ice:#74bccd;--ok:#5fc27e;}
  html[data-theme="light"]{--bg:#f3efe7;--bg2:#ffffff;--panel:#faf7f1;--line:#ded7c8;--ink:#1b2733;--muted:#5e7180;--gold:#a9761a;--flamme:#c23b27;--ice:#2c7a90;--ok:#3c9159;}
  html{background:var(--bg)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;
    background-image:linear-gradient(rgba(38,61,82,.35) 1px,transparent 1px),linear-gradient(90deg,rgba(38,61,82,.25) 1px,transparent 1px);background-size:100% 46px,46px 100%;}
  .wrap{max-width:960px;margin:0 auto;padding:clamp(20px,4vw,44px) clamp(16px,4vw,32px) 60px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .toprt{display:flex;gap:8px;align-items:center}
  .langsel{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .langsel button{font-family:'Inter';font-weight:700;font-size:.72rem;color:var(--muted);background:var(--bg2);border:none;padding:8px 12px;cursor:pointer}
  .langsel button[aria-pressed="true"]{background:var(--gold);color:#1a1206}
  .theme-toggle{font-family:'Inter';font-weight:600;font-size:.76rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:8px 14px;cursor:pointer;white-space:nowrap}
  .theme-toggle:hover{border-color:var(--gold);color:var(--ink)}
  .eyebrow{font-family:'Barlow Condensed';font-weight:600;letter-spacing:.28em;text-transform:uppercase;font-size:.8rem;color:var(--gold)}
  h1{font-family:'Barlow Condensed';font-weight:700;line-height:.92;font-size:clamp(2.6rem,9vw,5.2rem);letter-spacing:-.01em;margin:.15em 0 .1em}
  h1 .sub{display:block;color:var(--ink)}
  .event{margin-top:6px;color:var(--gold);font-weight:700;letter-spacing:.02em;font-family:'JetBrains Mono';font-size:clamp(.72rem,2.4vw,.9rem)}
  .route{font-family:'JetBrains Mono';font-size:clamp(.72rem,2.4vw,.9rem);color:var(--muted);letter-spacing:.02em;margin-top:.3em}
  .route b{color:var(--ice);font-weight:700}
  .profile{margin:26px 0 8px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#0f1e2b,#0c1824);overflow:hidden;position:relative}
  .profile svg{display:block;width:100%;height:auto}
  .prof-cap{position:absolute;top:10px;left:14px;font-family:'Barlow Condensed';font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:.7rem;color:#89a2b4}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:clamp(18px,3vw,26px);margin-top:22px}
  .panel-title{font-family:'Barlow Condensed';font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:.82rem;color:var(--muted);margin-bottom:16px}
  .fields3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  @media(max-width:560px){.fields3{grid-template-columns:1fr 1fr}}
  label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:7px;font-weight:500}
  .inp{display:flex;align-items:baseline;gap:8px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .inp:focus-within{border-color:var(--gold)}
  .inp input{background:none;border:none;color:var(--ink);font-family:'JetBrains Mono';font-weight:700;font-size:1.15rem;width:100%;outline:none}
  .inp .unit{font-family:'JetBrains Mono';color:var(--muted);font-size:.9rem;font-weight:500}
  .inp select{background:none;border:none;color:var(--ink);font-family:'JetBrains Mono';font-weight:700;font-size:1.05rem;width:100%;outline:none;appearance:none;cursor:pointer}
  .inp select option{background:#122130;color:#eaf1f5}
  .obj{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
  .obj button{font-family:'Inter';font-weight:600;font-size:.82rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 6px;cursor:pointer;line-height:1.25}
  .obj button small{display:block;font-weight:400;font-size:.68rem;opacity:.7;margin-top:2px}
  .obj button[aria-pressed="true"]{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .results{margin-top:26px}
  .total{display:flex;flex-wrap:wrap;align-items:flex-end;gap:6px 28px;border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:6px}
  .total .big{font-family:'Barlow Condensed';font-weight:700;font-size:clamp(3rem,12vw,5rem);line-height:.85;color:var(--gold)}
  .total .meta{font-size:.82rem;color:var(--muted);padding-bottom:8px}
  .total .meta b{color:var(--ice);font-family:'JetBrains Mono';font-weight:700}
  .timeline{display:flex;flex-direction:column}
  .col{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:16px 4px;border-bottom:1px solid var(--line)}
  .col .idx{font-family:'Barlow Condensed';font-weight:700;font-size:1.5rem;color:var(--line);width:26px;text-align:center;padding-top:2px}
  .col.key .idx{color:var(--flamme)}
  .col .name{font-family:'Barlow Condensed';font-weight:600;font-size:1.35rem}
  .col .spec{font-family:'JetBrains Mono';font-size:.72rem;color:var(--muted);margin-top:1px}
  .col .cue{font-size:.74rem;color:var(--ice);margin-top:3px;font-style:italic}
  .col .nums{text-align:right;white-space:nowrap;padding-top:2px}
  .col .w{font-family:'JetBrains Mono';font-weight:700;font-size:1.5rem;color:var(--gold)}
  .col .w .u{font-size:.5em;color:var(--muted);font-weight:500}
  .col .wkg{font-family:'JetBrains Mono';font-size:.74rem;color:var(--muted);margin-top:1px}
  .col .t{font-family:'JetBrains Mono';font-size:.82rem;color:var(--ink);margin-top:3px}
  .col .pass{font-family:'JetBrains Mono';font-size:.7rem;color:var(--gold);margin-top:1px}
  .liaison{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:11px 4px;border-bottom:1px solid var(--line)}
  .liaison .dot{width:26px;text-align:center;color:#5a89a8;font-size:1rem;opacity:.8}
  .liaison .ln{font-family:'Inter';font-size:.86rem;color:var(--muted)}
  .liaison .ls{font-family:'JetBrains Mono';font-size:.68rem;color:var(--line)}
  .liaison .lt{text-align:right;white-space:nowrap;font-family:'JetBrains Mono';font-size:.76rem;color:var(--muted)}
  .liaison .lp{font-family:'JetBrains Mono';font-size:.68rem;color:var(--muted);opacity:.7}
  .ravito{margin-top:6px;font-size:.72rem;color:var(--ink);background:rgba(116,188,205,.09);border:1px solid rgba(116,188,205,.28);border-radius:7px;padding:5px 9px;display:inline-block}
  .ravito .rk{font-family:'JetBrains Mono';color:var(--ice);font-weight:700}
  .barrier{margin-top:7px;font-size:.72rem;font-family:'JetBrains Mono';padding:5px 9px;border-radius:7px;display:inline-block;background:rgba(226,80,59,.1);border:1px solid rgba(226,80,59,.3);color:#f0a99e}
  .barrier b{color:var(--flamme)} .barrier.ok{background:rgba(95,194,126,.1);border-color:rgba(95,194,126,.3);color:#b6e6c6}
  .barrier.ok b{color:var(--ok)}
  .rzone{grid-column:2/-1}
  .nutri-sub{font-size:.86rem;color:var(--muted);margin:-6px 0 18px}
  .nutri-sub b{color:var(--gold);font-family:'JetBrains Mono';font-weight:700}
  .sliders{margin-top:20px;display:grid;gap:18px}
  .slider-row .shead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .slider-row .slabel{font-size:.86rem;color:var(--ink);font-weight:500}
  .slider-row .sval{font-family:'JetBrains Mono';font-weight:700;color:var(--gold);font-size:1.1rem}
  .slider-row .sval small{color:var(--muted);font-weight:500;font-size:.72rem}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:6px;background:var(--bg2);outline:none;border:1px solid var(--line);accent-color:var(--gold)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);border:3px solid #0c1620;cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--gold);border:3px solid #0c1620;cursor:pointer}
  .gauge-wrap{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
  .gauge-top{display:flex;justify-content:space-between;align-items:baseline;font-family:'JetBrains Mono';font-size:.8rem;color:var(--muted);margin-bottom:8px}
  .gauge-top b{color:var(--ink);font-weight:700}
  .gauge{position:relative;height:26px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .gauge-fill{height:100%;width:0;background:linear-gradient(90deg,#c9902f,var(--gold));transition:width .25s,background .25s}
  .gauge.short .gauge-fill{background:linear-gradient(90deg,#b23a2c,var(--flamme))}
  .gauge.good .gauge-fill{background:linear-gradient(90deg,#3f9a5e,var(--ok))}
  .verdict{margin-top:16px;font-size:.92rem;font-weight:500;color:var(--ink)}
  .verdict .em{font-family:'JetBrains Mono';font-weight:700}
  .verdict.short .em{color:var(--flamme)} .verdict.good .em{color:var(--ok)} .verdict.over .em{color:var(--gold)}
  .sodium{margin-top:14px;font-size:.78rem;color:var(--muted)} .sodium b{color:var(--ice)}
  .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
  .actbtn{font-family:'Inter';font-weight:600;font-size:.86rem;color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .actbtn:hover{border-color:var(--gold);color:var(--gold)}
  .actbtn.prim{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .foot{margin-top:26px;font-size:.72rem;color:var(--muted);line-height:1.6} .foot b{color:var(--ice)}
  .modal{position:fixed;inset:0;background:rgba(6,12,18,.82);display:none;align-items:flex-start;justify-content:center;padding:24px 12px;overflow:auto;z-index:50}
  .modal.open{display:flex}
  .sheet{background:#fff;color:#111;border-radius:12px;max-width:560px;width:100%;padding:18px}
  .sheet h3{font-family:'Barlow Condensed';font-weight:700;font-size:1.4rem;color:#111}
  .sheet p.hint{font-size:.78rem;color:#555;margin-bottom:12px}
  .sheet .close{float:right;border:none;background:#eee;border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:600}
  .sticker-print{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .tt{width:132px;border:1px dashed #999;border-radius:6px;overflow:hidden;font-family:Arial,sans-serif}
  .tt .h{background:#1c5e8c;color:#fff;text-align:center;padding:5px 3px}
  .tt .h b{font-size:11px;display:block}.tt .h small{font-size:7px;opacity:.9}
  .tt .r{padding:4px 5px;border-bottom:1px solid #ddd;font-size:8px;line-height:1.15;display:flex;justify-content:space-between}
  .tt .r.k{background:#fff4d6}.tt .r.c{background:#fbe9e9}.tt .r.d{background:#eef4fa}.tt .r.f{background:#f5f5f5}
  .tt .r .km{font-weight:700;color:#111}.tt .r .w{font-weight:700;color:#c8641a}.tt .r.k .w{color:#c81c36}
  .tt .r .rav{color:#1c6e8c;font-weight:700;font-size:7px}.tt .r .nm{color:#666;font-size:7px}
  .tt .foot2{background:#111;color:#fff;text-align:center;font-size:6.5px;padding:4px 3px;font-style:italic;line-height:1.3}
  @media print{body{background:#fff!important}.topbar,.actions,.panel .obj,.modal{display:none!important}}
  .tabs{display:flex;gap:8px;margin-top:22px}
  .tab{font-family:'Barlow Condensed';font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:.92rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:11px 20px;cursor:pointer}
  .tab[aria-pressed="true"]{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .chk-group h4{font-family:'Barlow Condensed';font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:.8rem;color:var(--gold);margin:18px 0 6px}
  .chk-item{display:flex;align-items:flex-start;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line)}
  .chk-item input{margin-top:3px;width:18px;height:18px;accent-color:var(--gold);flex:0 0 auto;cursor:pointer}
  .chk-item.done label{color:var(--muted);text-decoration:line-through}
  .chk-item label{font-size:.92rem;cursor:pointer}
  .wxnote{margin-top:10px;font-size:.78rem;color:var(--ink);background:rgba(242,180,61,.09);border:1px solid rgba(242,180,61,.28);border-radius:8px;padding:9px 12px}
  .wx-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .wx-upd{font-family:'JetBrains Mono';font-size:.68rem;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:8px}
  .wx-upd button{font-family:'Inter';font-weight:600;font-size:.72rem;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer}
  .wx-upd button:hover{border-color:var(--gold);color:var(--ink)}
  .wxgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:640px){.wxgrid{grid-template-columns:1fr 1fr}}
  @media(max-width:400px){.wxgrid{grid-template-columns:1fr}}
  .wxcard{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .wxcard.key{border-color:rgba(226,80,59,.55)}
  .wxcard .wxn{font-family:'Barlow Condensed';font-weight:600;font-size:1.2rem;line-height:1.05}
  .wxcard.key .wxn{color:var(--flamme)}
  .wxcard .wxkm{font-family:'JetBrains Mono';font-size:.66rem;color:var(--muted);margin-top:2px}
  .wxcard .wxpass{font-family:'JetBrains Mono';font-size:.68rem;color:var(--ice);margin-top:2px}
  .wxcard .wxmain{display:flex;align-items:center;gap:10px;margin-top:10px}
  .wxcard .wxico{font-size:2rem;line-height:1}
  .wxcard .wxt{font-family:'JetBrains Mono';font-weight:700;font-size:1.9rem;color:var(--gold)}
  .wxcard .wxt .u{font-size:.46em;color:var(--muted)}
  .wxcard .wxdesc{font-size:.72rem;color:var(--muted);margin-top:3px;min-height:1.1em}
  .wxcard .wxrow{display:flex;justify-content:space-between;gap:8px;font-family:'JetBrains Mono';font-size:.68rem;color:var(--muted);margin-top:8px}
  .wxcard .wxrow:first-of-type{padding-top:8px;border-top:1px solid var(--line)}
  .wxcard .wxrow b{color:var(--ink);font-weight:700}
  .wxcard .wxrain b{color:var(--ice)}
  .wx-msg{font-size:.88rem;color:var(--muted);padding:10px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="eyebrow" id="eyebrow"></div>
    <div class="toprt">
      <div class="langsel"><button data-l="fr">FR</button><button data-l="en">EN</button></div>
      <button id="themeBtn" class="theme-toggle"></button>
    </div>
  </div>
  <h1>SAS to<span class="sub">Summit</span></h1>
  <div class="event">L'ÉTAPE DU TOUR 2026</div>
  <div class="route" id="route"></div>
  <div class="profile"><div class="prof-cap" id="profcap"></div>
    <svg viewBox="0 0 1000 320" preserveAspectRatio="none" role="img" aria-label="profil">
      <defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f2b43d" stop-opacity="0.28"/><stop offset="1" stop-color="#f2b43d" stop-opacity="0.02"/></linearGradient></defs>

      <path d="M0,278.4 L85,268.0 L100,243.3 L115,214.6 L135,220.0 L174,157.7 L191,152.9 L209,136.1 L226,116.0 L306,238.0 L403,287.6 L471,278.0 L521,203.9 L541,176.1 L568,194.0 L606,175.4 L626,128.6 L650,89.2 L676,47.0 L729,117.0 L806,250.0 L871,236.3 L900,196.7 L947,124.1 L971,157.6 L1000,142.0" fill="none" stroke="#f2b43d" stroke-width="2" stroke-linejoin="round"/>
      <g font-family="Barlow Condensed"><circle cx="226" cy="116.0" r="4" fill="#f2b43d"/><text x="226" y="107.0" fill="#eaf1f5" font-size="14" font-weight="600" text-anchor="middle">Croix de Fer</text><text x="226" y="94.0" fill="#f2b43d" font-size="10.5" text-anchor="middle" font-family="JetBrains Mono">2067 m</text><circle cx="541" cy="176.1" r="4" fill="#f2b43d"/><text x="541" y="167.1" fill="#eaf1f5" font-size="14" font-weight="600" text-anchor="middle">Télégraphe</text><text x="541" y="154.1" fill="#f2b43d" font-size="10.5" text-anchor="middle" font-family="JetBrains Mono">1566 m</text><circle cx="676" cy="47.0" r="4.5" fill="#e2503b"/><text x="676" y="38.0" fill="#eaf1f5" font-size="16" font-weight="700" text-anchor="middle">Galibier</text><text x="676" y="25.0" fill="#e2503b" font-size="10.5" text-anchor="middle" font-family="JetBrains Mono">2642 m</text><circle cx="947" cy="124.1" r="4" fill="#f2b43d"/><text x="947" y="115.1" fill="#eaf1f5" font-size="14" font-weight="600" text-anchor="middle">Sarenne</text><text x="947" y="102.1" fill="#f2b43d" font-size="10.5" text-anchor="middle" font-family="JetBrains Mono">1999 m</text></g><g><circle cx="226" cy="116.0" r="3" fill="#74bccd" stroke="#0c1620" stroke-width="1"/><text x="226" y="131.0" fill="#74bccd" font-size="9.5" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">R1</text><circle cx="403" cy="287.6" r="3" fill="#74bccd" stroke="#0c1620" stroke-width="1"/><text x="403" y="301.6" fill="#74bccd" font-size="9.5" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">R2</text><circle cx="471" cy="278.0" r="3" fill="#74bccd" stroke="#0c1620" stroke-width="1"/><text x="471" y="292.0" fill="#74bccd" font-size="9.5" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">R3</text><circle cx="606" cy="175.4" r="3" fill="#74bccd" stroke="#0c1620" stroke-width="1"/><text x="606" y="189.4" fill="#74bccd" font-size="9.5" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">R4</text><circle cx="676" cy="47.0" r="3" fill="#74bccd" stroke="#0c1620" stroke-width="1"/><text x="676" y="62.0" fill="#74bccd" font-size="9.5" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">R5</text><circle cx="729" cy="117.0" r="3" fill="#74bccd" stroke="#0c1620" stroke-width="1"/><text x="729" y="131.0" fill="#74bccd" font-size="9.5" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">R6</text><circle cx="900" cy="196.7" r="3" fill="#74bccd" stroke="#0c1620" stroke-width="1"/><text x="900" y="210.7" fill="#74bccd" font-size="9.5" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">R7</text><circle cx="1000" cy="142.0" r="3" fill="#74bccd" stroke="#0c1620" stroke-width="1"/><text x="996" y="156.0" fill="#74bccd" font-size="9.5" font-weight="700" text-anchor="end" font-family="JetBrains Mono">ARR</text></g>
    </svg>
  </div>

  <div class="tabs"><button class="tab" data-tab="plan" aria-pressed="true" id="tabPlan"></button><button class="tab" data-tab="check" id="tabCheck"></button></div>

  <div id="viewPlan">
  <div class="panel">
    <div class="panel-title" id="dataTitle"></div>

function computeNutrition(){
  var hrs=totalSec/3600;

  var gBidon=Math.max(0,+document.getElementById('gBidon').value||0);

  document.getElementById('nGelV').textContent=nGel;document.getElementById('nBidonV').textContent=nBidon;
  var need=Math.round(gph*hrs),carried=nGel*gGel+nBidon*gBidon,realGph=hrs>0?carried/hrs:0,cover=need>0?carried/need:0;
  document.getElementById('nutSub').innerHTML=fmtn(t('nutSub'),{dur:'<b>'+fmtDur(totalSec)+'</b>',need:'<b>'+need+' g</b>'});
  document.getElementById('gCarried').innerHTML=fmtn(t('gCarried'),{c:'<b>'+carried+' g</b>'});
  document.getElementById('nGph').textContent=fmtn(t('gGph'),{n:Math.round(realGph)});
  var fill=document.getElementById('gaugeFill'),gauge=document.getElementById('gauge'),v=document.getElementById('verdict');
  fill.style.width=Math.min(cover,1)*100+'%';gauge.classList.remove('short','good');v.classList.remove('short','good','over');
  var miss=need-carried,perGel=gGel||45;
  if(cover<0.9){gauge.classList.add('short');v.classList.add('short');v.innerHTML=fmtn(t('vShort'),{miss:'<span class="em">'+miss+'</span>',n:Math.ceil(miss/perGel)});}
  else if(cover<=1.15){gauge.classList.add('good');v.classList.add('good');v.innerHTML=fmtn(t('vGood'),{pct:'<span class="em">'+Math.round(cover*100)+'</span>',gph:Math.round(realGph)});}
  else{v.classList.add('over');v.innerHTML=fmtn(t('vOver'),{pct:'<span class="em">'+Math.round(cover*100)+'</span>',gph:Math.round(realGph)});}
}

// ---- events ----
(function initSas(){var sel=document.getElementById('sas');sel.addEventListener('change',function(){document.getElementById('start').value=sasToClock(+sel.value);compute();});})();
document.getElementById('obj').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;obj=b.dataset.o;var bs=document.querySelectorAll('#obj button');for(var i=0;i<bs.length;i++)bs[i].setAttribute('aria-pressed',bs[i]===b);compute();});
['ftp','kg'].forEach(function(id){document.getElementById(id).addEventListener('input',compute);});
['gph','gGel','gBidon','nGel','nBidon'].forEach(function(id){document.getElementById(id).addEventListener('input',computeNutrition);});
document.getElementById('temp').addEventListener('input',function(){tempTouched=true;updateWx();});
document.getElementById('wxRefresh').addEventListener('click',fetchWeather);
document.querySelectorAll('.tab').forEach(function(tb){tb.addEventListener('click',function(){var w=tb.dataset.tab;document.getElementById('viewPlan').style.display=(w==='plan')?'':'none';document.getElementById('viewCheck').style.display=(w==='check')?'':'none';document.querySelectorAll('.tab').forEach(function(x){x.setAttribute('aria-pressed',x===tb);});});});
document.getElementById('chkReset').addEventListener('click',function(){chkSave({});renderChecklist();});
document.querySelectorAll('.langsel button').forEach(function(b){b.addEventListener('click',function(){lang=b.dataset.l;applyLang();});});
document.getElementById('pdfBtn').addEventListener('click',function(){var done=busy(this,t('busy'));try{generatePlanPDF();}catch(e){alert('PDF error: '+e.message);}setTimeout(done,600);});
document.getElementById('stickerBtn').addEventListener('click',function(){buildStickerPreview();document.getElementById('stickerModal').classList.add('open');});
document.getElementById('mClose').addEventListener('click',function(){document.getElementById('stickerModal').classList.remove('open');});
document.addEventListener('click',function(e){var tt=(e.target.closest&&e.target.closest('#stickerPdfBtn'));if(!tt)return;var done=busy(tt,t('busy'));try{generateStickerPDF();}catch(err){alert('PDF error: '+err.message);}setTimeout(done,600);});
(function initTheme(){var root=document.documentElement,btn=document.getElementById('themeBtn'),saved=null;try{saved=localStorage.getItem('edt-theme');}catch(e){}
  function ap(th){root.setAttribute('data-theme',th);btn.textContent=(th==='light')?t('theme_dark'):t('theme_light');try{localStorage.setItem('edt-theme',th);}catch(e){}}
  ap(saved==='light'?'light':'dark');
  btn.addEventListener('click',function(){ap(root.getAttribute('data-theme')==='light'?'dark':'light');});})();

applyLang();
fetchWeather();
</script>
